<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rail Dispatcher - Satisfactory Train Planner</title>
<style>
  :root{
    --bg:#14181B; --panel:#1C2327; --panel2:#232C31; --inset:#101417;
    --line:#303B41; --line2:#3D4A51;
    --ink:#E9EEEB; --muted:#8FA0A0; --faint:#5E6E6E;
    --accent:#F0862E; --accent-dim:#8A4E1D;
    --unload:#4FB3BF; --unload-dim:#2C666D;
    --err:#E5604C; --warn:#E7B549; --ok:#57C48C;
    --disp:'Bahnschrift','DIN Alternate','Franklin Gothic Medium','Arial Narrow',system-ui,sans-serif;
    --body:system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45}
  ::selection{background:var(--accent-dim);color:#fff}

  header{padding:18px 24px 0}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .brand h1{font-family:var(--disp);font-size:22px;letter-spacing:.14em;text-transform:uppercase;margin:0;font-weight:700}
  .brand h1 .dim{color:var(--accent)}
  .brand .sub{color:var(--muted);font-size:12px;letter-spacing:.06em;text-transform:uppercase}
  .hazard{height:6px;margin-top:12px;border-radius:2px;
    background:repeating-linear-gradient(-45deg,var(--accent) 0 12px,#3a2410 12px 24px)}

  /* ---------- world tabs ---------- */
  .worldbar{display:flex;align-items:center;gap:6px;padding:14px 24px 0;flex-wrap:wrap}
  .wtab{background:var(--panel);border:1px solid var(--line);border-bottom-color:var(--line);color:var(--muted);
    padding:7px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-family:var(--disp);letter-spacing:.08em;
    text-transform:uppercase;font-size:12px}
  .wtab.active{color:var(--ink);border-color:var(--accent);border-bottom:2px solid var(--accent);background:var(--panel2)}
  .wtab:hover{color:var(--ink)}
  .worldbar .spacer{flex:1}
  .wactions{display:flex;gap:6px}

  main{padding:0 24px 60px;max-width:1180px}
  .sectionnav{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:0 0 20px}
  .snav{background:none;border:none;color:var(--muted);padding:11px 16px;cursor:pointer;font-family:var(--disp);
    text-transform:uppercase;letter-spacing:.1em;font-size:13px;border-bottom:2px solid transparent;position:relative}
  .snav.active{color:var(--ink);border-bottom-color:var(--accent)}
  .snav:hover{color:var(--ink)}
  .badge{display:inline-block;min-width:18px;padding:1px 5px;border-radius:9px;font-size:11px;font-family:var(--mono);
    margin-left:6px;vertical-align:1px}
  .badge.err{background:var(--err);color:#1a0d0a}
  .badge.warn{background:var(--warn);color:#221a05}
  .badge.ok{background:var(--ok);color:#0a1f15}

  /* ---------- generic ---------- */
  button{font-family:var(--body)}
  .btn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);padding:6px 12px;border-radius:5px;
    cursor:pointer;font-size:13px}
  .btn:hover{border-color:var(--accent);color:#fff}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#1a0f04;font-weight:600}
  .btn.primary:hover{filter:brightness(1.1);color:#000}
  .btn.small{padding:3px 8px;font-size:12px}
  .btn.danger:hover{border-color:var(--err);color:var(--err)}
  .btn.ghost{background:none;border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--err);border-color:transparent}
  input[type=text],input[type=number],select{background:var(--inset);border:1px solid var(--line);color:var(--ink);
    padding:6px 8px;border-radius:4px;font-size:13px;font-family:var(--body)}
  input[type=number]{font-family:var(--mono);width:80px}
  input:focus,select:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
  .card.dragover{border-top:3px solid var(--accent);padding-top:14px}
  .card.dragging{opacity:.45}
  .draghandle{cursor:grab;color:var(--faint);font-size:15px;padding:2px 4px;user-select:none;line-height:1}
  .draghandle:hover{color:var(--accent)}
  .draghandle:active{cursor:grabbing}
  .chev{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 6px;line-height:1;
    transition:transform .12s}
  .chev:hover{color:var(--accent)}
  .chev.closed{transform:rotate(-90deg)}
  @media (prefers-reduced-motion:reduce){ .chev{transition:none} }
  .routeblock{border-top:1px solid var(--line);margin-top:14px;padding-top:12px}
  .routehead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .cardhead{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .cardhead input.name{font-family:var(--disp);font-size:15px;letter-spacing:.05em;min-width:200px}
  .cardhead .spacer{flex:1}
  .label{font-family:var(--disp);text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--muted)}
  .empty{color:var(--faint);font-style:italic;padding:20px 0}
  .mono{font-family:var(--mono)}
  .hint{color:var(--faint);font-size:12px;margin-top:6px}

  /* ---------- consist (train car) editor ---------- */
  .consist{display:flex;align-items:flex-end;gap:4px;flex-wrap:wrap;padding:10px 0 4px}
  .railcar{position:relative;width:74px;height:44px;border-radius:5px;cursor:pointer;border:1px solid var(--line2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;transition:transform .06s}
  .railcar:hover{transform:translateY(-2px)}
  .railcar .idx{position:absolute;top:-16px;font-size:10px;color:var(--faint);font-family:var(--mono)}
  .railcar .kind{font-family:var(--disp);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .railcar::after{content:'';position:absolute;bottom:-7px;left:12px;right:12px;height:5px;
    background:radial-gradient(circle 3px at 25% 50%,var(--faint) 95%,transparent),
               radial-gradient(circle 3px at 75% 50%,var(--faint) 95%,transparent)}
  .railcar.engine{background:linear-gradient(180deg,#3d2a15,#2a1d0f);border-color:var(--accent-dim);color:var(--accent)}
  .railcar.engine .stripe{width:80%;height:4px;margin-top:4px;border-radius:2px;
    background:repeating-linear-gradient(-45deg,var(--accent) 0 6px,transparent 6px 12px)}
  .railcar.freight{background:linear-gradient(180deg,#26333a,#1d282e);border-color:var(--line2);color:var(--muted)}
  .railcar.freight .stripe{width:80%;height:4px;margin-top:4px;border-radius:2px;background:var(--line2)}
  .railcar.fluidcar{background:linear-gradient(180deg,#2a2740,#1e1c30);border-color:#57509a;color:#a49aeb;border-radius:14px}
  .railcar.fluidcar .stripe{width:80%;height:4px;margin-top:4px;border-radius:2px;background:#57509a}
  .railcar.locked{cursor:default}
  .railcar.locked:hover{transform:none}

  /* ---------- platforms ---------- */
  .plats{display:flex;flex-direction:column;gap:6px}
  .plat{display:flex;align-items:center;gap:10px;background:var(--inset);border:1px solid var(--line);
    border-left:4px solid var(--line2);border-radius:5px;padding:8px 10px;flex-wrap:wrap}
  .plat.load{border-left-color:var(--accent)}
  .plat.unload{border-left-color:var(--unload)}
  .plat.empty{border-left-color:var(--line2)}
  .plat .pos{font-family:var(--mono);color:var(--faint);font-size:12px;width:52px}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:5px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--muted);padding:5px 11px;cursor:pointer;font-size:12px;
    font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase}
  .seg button.on.load{background:var(--accent);color:#1a0f04}
  .seg button.on.unload{background:var(--unload);color:#04191b}
  .seg button.on.empty{background:var(--line2);color:var(--ink)}
  .seg button.on.regular{background:var(--muted);color:#141a1a}
  .seg button.on.fluid{background:#7A6FD0;color:#100e1f}
  .plat.fluid{background:#171a24}
  .platitems{display:flex;flex-direction:column;gap:5px;flex:1;min-width:260px}
  .platitem{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .platitem select{flex:1;min-width:160px}
  .platitems > .btn{align-self:flex-start}

  /* ---------- routes ---------- */
  .stop{background:var(--inset);border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin-bottom:8px}
  .stoprow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .stopnum{font-family:var(--mono);color:var(--accent);font-size:12px;width:26px}
  .rules{display:grid;grid-template-columns:auto 1fr;gap:6px 10px;margin-top:10px;align-items:center}
  .rules .rlabel{font-size:11px;font-family:var(--disp);letter-spacing:.1em;text-transform:uppercase}
  .rlabel.load{color:var(--accent)}
  .rlabel.unload{color:var(--unload)}
  .rulewrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .rulewrap input[type=text]{flex:1;min-width:180px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);
    border-radius:12px;padding:3px 6px 3px 10px;font-size:12px}
  .chip.load{border-color:var(--accent-dim)}
  .chip.unload{border-color:var(--unload-dim)}
  .chip button{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;padding:0 3px;line-height:1}
  .chip button:hover{color:var(--err)}
  .looparrow{color:var(--faint);font-size:12px;text-align:center;padding:2px 0 8px;font-family:var(--mono)}

  /* ---------- analysis ---------- */
  .issue{display:flex;gap:10px;background:var(--inset);border:1px solid var(--line);border-left:4px solid;
    border-radius:5px;padding:9px 12px;margin-bottom:6px;align-items:baseline}
  .issue.err{border-left-color:var(--err)}
  .issue.warn{border-left-color:var(--warn)}
  .issue .tag{font-family:var(--disp);font-size:10px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;padding-top:1px}
  .issue.err .tag{color:var(--err)}
  .issue.warn .tag{color:var(--warn)}
  .allclear{display:flex;gap:10px;align-items:center;color:var(--ok);background:var(--inset);
    border:1px solid var(--line);border-left:4px solid var(--ok);border-radius:5px;padding:10px 12px}
  h2.sec{font-family:var(--disp);text-transform:uppercase;letter-spacing:.14em;font-size:13px;color:var(--muted);
    border-bottom:1px solid var(--line);padding-bottom:6px;margin:26px 0 12px}
  .board{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:14px}
  .board h3{font-family:var(--disp);letter-spacing:.06em;font-size:15px;margin:0 0 10px;text-transform:uppercase}
  table.flow{width:100%;border-collapse:collapse;font-size:13px}
  table.flow th{font-family:var(--disp);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);
    text-align:left;padding:4px 10px;border-bottom:1px solid var(--line)}
  table.flow td{padding:6px 10px;border-bottom:1px solid #222a2e;vertical-align:top}
  table.flow tr:last-child td{border-bottom:none}
  .modechip{font-family:var(--disp);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px}
  .modechip.load{background:var(--accent-dim);color:#ffd9b3}
  .modechip.unload{background:var(--unload-dim);color:#c9eef2}
  .modechip.empty{background:#333d42;color:var(--muted)}
  .rate{font-family:var(--mono);color:var(--ink)}
  .dimtxt{color:var(--faint)}
  .manif{font-size:13px}
  .manif .mstop{padding:6px 0;border-bottom:1px solid #222a2e}
  .manif .mstop:last-child{border-bottom:none}
  .ld{color:var(--accent)} .ul{color:var(--unload)}
  .journeys{border-top:1px dashed var(--line);margin-top:8px;padding-top:8px}
  .jrow{font-size:12.5px;padding:3px 0;line-height:1.5}

  footer{padding:10px 24px;color:var(--faint);font-size:12px}
  #storageNote{color:var(--warn)}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line2);border-radius:8px;max-width:420px}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  @media (max-width:700px){ main,header,.worldbar{padding-left:12px;padding-right:12px} }
  @media (prefers-reduced-motion:reduce){ .railcar{transition:none} .railcar:hover{transform:none} }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Rail <span class="dim">Dispatcher</span></h1>
    <span class="sub">Satisfactory train network planner</span>
  </div>
  <div class="hazard"></div>
</header>

<div class="worldbar" id="worldbar"></div>

<main>
  <nav class="sectionnav" id="sectionnav"></nav>
  <div id="content"></div>
</main>

<footer>
  <span id="storageBase">Data is saved to this browser via localStorage.</span> <span id="storageNote"></span>
</footer>

<datalist id="itemlist"></datalist>
<dialog id="importModal" style="max-width:680px;width:92vw">
  <div class="label" style="margin-bottom:8px">Import world JSON</div>
  <textarea id="importText" spellcheck="false" placeholder="Paste an exported world JSON here…"
    style="width:100%;height:220px;background:var(--inset);color:var(--ink);border:1px solid var(--line);
           border-radius:4px;font-family:var(--mono);font-size:12px;padding:8px;resize:vertical"></textarea>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
    <button class="btn" id="importClose">Cancel</button>
    <button class="btn" id="importFileBtn">Choose file…</button>
    <button class="btn primary" id="importGo">Import pasted JSON</button>
  </div>
</dialog>
<dialog id="exportModal" style="max-width:680px;width:92vw">
  <div class="label" style="margin-bottom:8px" id="exportTitle">Export world JSON</div>
  <textarea id="exportText" readonly spellcheck="false"
    style="width:100%;height:280px;background:var(--inset);color:var(--ink);border:1px solid var(--line);
           border-radius:4px;font-family:var(--mono);font-size:12px;padding:8px;resize:vertical"></textarea>
  <div class="hint" style="margin:8px 0 12px">Some environments (like published artifact pages) block downloads. If the download button does nothing, copy the JSON and save it as a .json file.</div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" id="exportClose">Close</button>
    <button class="btn" id="exportCopy">Copy to clipboard</button>
    <button class="btn primary" id="exportDownload">Download</button>
  </div>
</dialog>
<dialog id="modal">
  <div id="modalMsg" style="margin-bottom:12px"></div>
  <input type="text" id="modalInput" style="display:none;width:100%;margin-bottom:12px">
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn" id="modalCancel">Cancel</button>
    <button class="btn primary" id="modalOk">OK</button>
  </div>
</dialog>
<input type="file" id="importFile" accept=".json,application/json" style="display:none">

<script>
'use strict';
/* ============================== state ============================== */
const LS_KEY = 'sf-rail-dispatcher-v1';
let storageOK = true;
try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); }
catch(e){ storageOK = false; }

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Math.random().toString(36).slice(2)+Date.now());

function newWorld(name){
  return { id: uid(), name, trains: [], stations: [] };
}
function newTrain(n){
  return { id: uid(), name: 'Train '+n, cars: ['E','F','F'], stops: [] };
}
function newStation(n){
  return { id: uid(), name: 'Station '+n, platforms: [ newPlatform() ] };
}
function newPlatform(){
  return {type:'regular', mode:'load', items:[{item:'', rate:60}]};
}
/* Older saves: single {item, rate} per platform, and "empty" was a mode
   rather than a type. */
function migrateWorld(w){
  (w.trains||[]).forEach(t=>{
    t.cars = (t.cars && t.cars.length ? t.cars : ['E']).map(c => ['E','F','L'].includes(c) ? c : 'F');
    t.cars[0] = 'E';
    t.stops = t.stops||[];
  });
  (w.stations||[]).forEach(st => (st.platforms||[]).forEach(p => {
    if(!Array.isArray(p.items)){
      p.items = (p.mode==='load' && p.item) ? [{item:p.item, rate:+p.rate||0}] : [];
      delete p.item; delete p.rate;
    }
    if(!p.type){
      if(p.mode==='empty'){ p.type='empty'; p.mode='load'; }
      else p.type = (p.items||[]).some(pi=>isFluid(pi.item)) && (p.items||[]).length===1 ? 'fluid' : 'regular';
    }
    if(!p.mode || p.mode==='empty') p.mode='load';
  }));
  return w;
}
function newStop(stationId){
  return { stationId, load: {mode:'any', items:[]}, unload: {mode:'any', items:[]} };
}

/* ============================== item catalog (satisfactory.wiki.gg, 1.0) ============================== */
const ITEM_GROUPS = [
  ['Resources', ['Bauxite','Caterium Ore','Coal','Compacted Coal','Copper Ore','Iron Ore','Limestone','Raw Quartz','SAM','Sulfur','Uranium','Wood','Leaves','Mycelia','Flower Petals','Bacon Agaric','Beryl Nut','Paleberry','Blue Power Slug','Yellow Power Slug','Purple Power Slug','Mercer Sphere','Somersloop','Hard Drive']],
  ['Ingots', ['Iron Ingot','Copper Ingot','Steel Ingot','Caterium Ingot','Aluminum Ingot','Aluminum Scrap','Ficsite Ingot']],
  ['Standard parts', ['Iron Plate','Iron Rod','Screw','Reinforced Iron Plate','Modular Frame','Heavy Modular Frame','Fused Modular Frame','Steel Beam','Steel Pipe','Encased Industrial Beam','Concrete','Wire','Cable','Quickwire','Copper Sheet','Copper Powder','Alclad Aluminum Sheet','Aluminum Casing','Silica','Quartz Crystal','Crystal Oscillator','Rotor','Stator','Motor','Turbo Motor','Battery','Heat Sink','Cooling System','Fabric','Empty Canister','Empty Fluid Tank','Power Shard','Gas Filter','Iodine-Infused Filter','Color Cartridge','FICSIT Coupon']],
  ['Oil & biomass', ['Plastic','Rubber','Polymer Resin','Petroleum Coke','Biomass','Solid Biofuel','Black Powder','Smokeless Powder','Packaged Water','Packaged Oil','Packaged Heavy Oil Residue','Packaged Fuel','Packaged Liquid Biofuel','Packaged Turbofuel','Packaged Rocket Fuel','Packaged Ionized Fuel','Packaged Alumina Solution','Packaged Sulfuric Acid','Packaged Nitric Acid','Packaged Nitrogen Gas']],
  ['Electronics', ['Circuit Board','AI Limiter','High-Speed Connector','Computer','Supercomputer','Radio Control Unit','Electromagnetic Control Rod']],
  ['Nuclear', ['Encased Uranium Cell','Uranium Fuel Rod','Uranium Waste','Non-Fissile Uranium','Plutonium Pellet','Encased Plutonium Cell','Plutonium Fuel Rod','Plutonium Waste','Ficsonium','Ficsonium Fuel Rod']],
  ['Quantum & endgame', ['Time Crystal','Diamonds','Dark Matter Crystal','Ficsite Trigon','Reanimated SAM','SAM Fluctuator','Superposition Oscillator','Neural-Quantum Processor','AI Expansion Server','Alien Power Matrix','Singularity Cell','Ballistic Warp Drive','Biochemical Sculptor']],
  ['Project Assembly parts', ['Smart Plating','Versatile Framework','Automated Wiring','Modular Engine','Adaptive Control Unit','Assembly Director System','Magnetic Field Generator','Thermal Propulsion Rocket','Nuclear Pasta','Pressure Conversion Cube']],
  ['Alien', ['Hog Remains','Hatcher Remains','Stinger Remains','Spitter Remains','Alien Protein','Alien DNA Capsule']],
  ['Ammunition', ['Iron Rebar','Stun Rebar','Shatter Rebar','Explosive Rebar','Nobelisk','Gas Nobelisk','Pulse Nobelisk','Cluster Nobelisk','Nuke Nobelisk','Rifle Ammo','Homing Rifle Ammo','Turbo Rifle Ammo']],
];
const FLUID_GROUP = ['Fluids & gases', ['Water','Crude Oil','Heavy Oil Residue','Fuel','Liquid Biofuel','Turbofuel','Rocket Fuel','Ionized Fuel','Alumina Solution','Sulfuric Acid','Nitric Acid','Nitrogen Gas','Dissolved Silica','Dark Matter Residue','Excited Photonic Matter','Quantum Energy']];
ITEM_GROUPS.forEach(g => g[1].sort());
FLUID_GROUP[1].sort();
const ITEM_SET = new Set(ITEM_GROUPS.flatMap(g => g[1]).concat(FLUID_GROUP[1]));
const FLUID_SET = new Set(FLUID_GROUP[1].map(f=>f.toLowerCase()));
const isFluid = item => FLUID_SET.has(String(item||'').toLowerCase());

/* Builds the grouped <option> markup, filtered by kind:
   'solid' = regular platforms, 'fluid' = fluid platforms, 'all' = route rules.
   If a stored value isn't in the catalog (older free-text data or edited
   imports), it's kept as a "(custom)" option so nothing breaks. */
function itemOptions(selected, kind='all'){
  let html = `<option value="" ${!selected?'selected':''}>— item —</option>`;
  if(selected && !ITEM_SET.has(selected))
    html += `<option value="${esc(selected)}" selected>${esc(selected)} (custom)</option>`;
  const groups = kind==='fluid' ? [FLUID_GROUP]
               : kind==='solid' ? ITEM_GROUPS
               : ITEM_GROUPS.concat([FLUID_GROUP]);
  groups.forEach(([label, items])=>{
    html += `<optgroup label="${esc(label)}">` +
      items.map(i=>`<option value="${esc(i)}" ${i===selected?'selected':''}>${esc(i)}</option>`).join('') +
      `</optgroup>`;
  });
  return html;
}

/* Storage backend tiers:
   1. 'cloud'  - Claude artifact storage (window.storage). Server-side,
                 per-user, survives sessions/devices, works where
                 localStorage is sandboxed away.
   2. 'local'  - browser localStorage (downloaded-file usage).
   3. 'memory' - nothing persists; a footer warning is shown. */
const HAS_CLOUD = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
const BACKEND = HAS_CLOUD ? 'cloud' : (storageOK ? 'local' : 'memory');

function normalizeState(s){
  if(!s || !Array.isArray(s.worlds) || !s.worlds.length) return null;
  s.worlds.forEach(migrateWorld);
  s.active = Math.min(s.active||0, s.worlds.length-1);
  s.section = (!s.section || s.section==='routes') ? 'trains' : s.section;
  s.collapsed = s.collapsed || {};
  return s;
}
let state = normalizeState({ worlds:[ newWorld('World 1') ], active:0, section:'trains', collapsed:{} });

function loadLocal(){
  if(!storageOK) return null;
  try{
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function initState(){
  let s = null;
  if(BACKEND==='cloud'){
    try{
      const r = await window.storage.get(LS_KEY);
      s = r && r.value ? JSON.parse(r.value) : null;
    }catch(e){ s = null; /* key not found yet is fine */ }
    /* one-time migration: pull older localStorage data into cloud storage */
    if(!s){
      s = loadLocal();
      if(s) queueSave();
    }
  } else {
    s = loadLocal();
  }
  const n = normalizeState(s);
  if(n) state = n;
}
let saveTimer = null;
function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    const payload = JSON.stringify(state);
    if(BACKEND==='cloud'){
      window.storage.set(LS_KEY, payload).catch(()=>{});
    } else if(BACKEND==='local'){
      try{ localStorage.setItem(LS_KEY, payload); }catch(e){}
    }
  }, 150);
}
function save(){
  queueSave();
  refreshBadge();
  refreshItemList();
}

/* ============================== helpers ============================== */
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => {
  const v = Math.round(n*100)/100;
  return String(v);
};
function refreshItemList(){ /* catalog is now a fixed set; nothing dynamic to refresh */ }
function ruleAllows(rule, item){
  if(!rule || rule.mode === 'any') return true;
  if(rule.mode === 'none') return false;
  return (rule.items||[]).map(i=>i.toLowerCase()).includes(String(item).toLowerCase());
}
/* Feeds a platform can physically provide: fluid platforms provide their one
   fluid; regular platforms provide their solid items; mismatches and empty
   platforms provide nothing (mismatches are flagged separately). */
function loadableFeeds(p){
  if(!p || p.type==='empty' || p.mode!=='load') return [];
  if(p.type==='fluid'){
    const pi = (p.items||[])[0];
    return (pi && pi.item && isFluid(pi.item)) ? [pi] : [];
  }
  return (p.items||[]).filter(pi=>pi.item && !isFluid(pi.item));
}
function canUnloadHere(p, item){
  return !!p && p.type!=='empty' && p.mode==='unload' && (isFluid(item) === (p.type==='fluid'));
}
/* In-app modal. Native confirm/prompt/alert are blocked in sandboxed
   preview iframes, so all confirmations go through this <dialog>. */
function modalAsk({message, input=null, noCancel=false}){
  return new Promise(res=>{
    const dlg = document.getElementById('modal');
    const msg = document.getElementById('modalMsg');
    const inp = document.getElementById('modalInput');
    const okBtn = document.getElementById('modalOk');
    const cBtn = document.getElementById('modalCancel');
    msg.textContent = message;
    cBtn.style.display = noCancel ? 'none' : '';
    if(input !== null){ inp.style.display='block'; inp.value = input; }
    else inp.style.display='none';
    const done = v => { cleanup(); dlg.close(); res(v); };
    const ok = () => done(input !== null ? inp.value : true);
    const cancel = () => done(input !== null ? null : false);
    const onKey = e => { if(e.key==='Enter'){ e.preventDefault(); ok(); } };
    const onCancelEvt = e => { e.preventDefault(); cancel(); };
    function cleanup(){
      okBtn.removeEventListener('click', ok);
      cBtn.removeEventListener('click', cancel);
      inp.removeEventListener('keydown', onKey);
      dlg.removeEventListener('cancel', onCancelEvt);
    }
    okBtn.addEventListener('click', ok);
    cBtn.addEventListener('click', cancel);
    inp.addEventListener('keydown', onKey);
    dlg.addEventListener('cancel', onCancelEvt);
    dlg.showModal();
    if(input !== null){ inp.focus(); inp.select(); }
    else okBtn.focus();
  });
}
const askConfirm = m => modalAsk({message:m});
const askText = (m, v='') => modalAsk({message:m, input:v});
const askNotice = m => modalAsk({message:m, noCancel:true});

/* Export dialog: shows the JSON with copy + best-effort download.
   Published/sandboxed pages often block programmatic downloads, so the
   clipboard path is the reliable one there. */
let exportFilename = 'world.json';
function openExportDialog(w){
  const dlg = document.getElementById('exportModal');
  document.getElementById('exportTitle').textContent = `Export "${w.name}" as JSON`;
  document.getElementById('exportText').value = JSON.stringify(w, null, 2);
  exportFilename = (w.name.replace(/[^\w\- ]+/g,'').trim().replace(/\s+/g,'-').toLowerCase() || 'world') + '.json';
  dlg.showModal();
}
function wireExportDialog(){
  const dlg = document.getElementById('exportModal');
  const ta = document.getElementById('exportText');
  const copyBtn = document.getElementById('exportCopy');
  document.getElementById('exportClose').addEventListener('click', ()=>dlg.close());
  copyBtn.addEventListener('click', async ()=>{
    const flash = ok => {
      copyBtn.textContent = ok ? 'Copied ✓' : 'Copy failed, select and copy manually';
      setTimeout(()=>{ copyBtn.textContent = 'Copy to clipboard'; }, 2000);
    };
    try{
      await navigator.clipboard.writeText(ta.value);
      flash(true);
    }catch(e){
      try{
        ta.focus(); ta.select();
        flash(document.execCommand('copy'));
      }catch(e2){ ta.focus(); ta.select(); flash(false); }
    }
  });
  document.getElementById('exportDownload').addEventListener('click', ()=>{
    try{
      const blob = new Blob([ta.value], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = exportFilename;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    }catch(e){}
  });
}

function ruleText(rule){
  if(!rule || rule.mode==='any') return 'anything';
  if(rule.mode==='none') return 'nothing';
  return (rule.items||[]).join(', ') || '(no items listed)';
}

/* ============================== analysis engine ============================== */
function analyze(w){
  const errors = [], warnings = [];
  const stById = {}; w.stations.forEach(s => stById[s.id] = s);

  /* structural sanity */
  w.trains.forEach(tr=>{
    if(tr.cars.filter(c=>c==='F'||c==='L').length === 0)
      warnings.push(`<b>${esc(tr.name)}</b> has no freight or fluid cars, so it can never carry anything.`);
    if(!(tr.stops||[]).length)
      warnings.push(`<b>${esc(tr.name)}</b> has no route defined.`);
    else if(tr.stops.length === 1)
      warnings.push(`<b>${esc(tr.name)}</b> only visits one station. A loop needs at least two stops to move anything.`);
    (tr.stops||[]).forEach((stop,si)=>{
      if(!stById[stop.stationId])
        warnings.push(`<b>${esc(tr.name)}</b> stop ${si+1} points at a deleted station. Remove or reassign it.`);
    });
  });
  w.stations.forEach(st=>{
    st.platforms.forEach((p,i)=>{
      if(p.type==='empty' || p.mode!=='load') return;
      if(p.type==='fluid'){
        const pi = (p.items||[])[0];
        if(!pi || !pi.item)
          warnings.push(`<b>${esc(st.name)}</b> platform ${i+1} is a fluid load platform with no fluid assigned.`);
        else{
          if(!isFluid(pi.item))
            warnings.push(`<b>${esc(st.name)}</b> platform ${i+1} is a fluid platform but is set to load ${esc(pi.item)}, which is not a fluid. It will load nothing.`);
          else if(!(+pi.rate>0))
            warnings.push(`<b>${esc(st.name)}</b> platform ${i+1} loads ${esc(pi.item)} at 0/min. Set a rate.`);
        }
      } else {
        const named = (p.items||[]).filter(x=>x.item);
        if(!named.length)
          warnings.push(`<b>${esc(st.name)}</b> platform ${i+1} is set to load but has no items assigned.`);
        named.forEach(x=>{
          if(isFluid(x.item))
            warnings.push(`<b>${esc(st.name)}</b> platform ${i+1} is a regular platform but is set to load ${esc(x.item)}, which is a fluid. Make it a fluid platform. It will load nothing as configured.`);
          else if(!(+x.rate>0))
            warnings.push(`<b>${esc(st.name)}</b> platform ${i+1} loads ${esc(x.item)} at 0/min. Set a rate.`);
        });
      }
    });
  });

  /* pickups: what each train actually collects, car by car */
  const pickups = []; // {train, stopIdx, station, car, item, rate, delivered, carryPath}
  w.trains.forEach(tr=>{
    (tr.stops||[]).forEach((stop,si)=>{
      const st = stById[stop.stationId]; if(!st) return;
      for(let c=1;c<tr.cars.length;c++){
        if(tr.cars[c] === 'E') continue;
        const p = st.platforms[c-1];
        if(!p) continue;
        /* freight cars dock regular platforms, fluid cars dock fluid platforms */
        if((tr.cars[c]==='L') !== (p.type==='fluid')) continue;
        loadableFeeds(p).forEach(pi=>{
          if(ruleAllows(stop.load, pi.item))
            pickups.push({train:tr, stopIdx:si, station:st, car:c, item:pi.item.trim(), rate:+pi.rate||0, delivered:null, carryPath:[]});
        });
      }
    });
  });

  /* flows: each pickup rides until the first stop where it can be unloaded */
  const deposits = []; // {train, stopIdx, station, car, item, rate, fromStation}
  pickups.forEach(pk=>{
    const stops = pk.train.stops, L = stops.length;
    for(let k=1;k<L;k++){
      const t = (pk.stopIdx+k)%L;
      const stop = stops[t];
      const st = stById[stop.stationId]; if(!st) continue;
      const p = st.platforms[pk.car-1];
      if(canUnloadHere(p, pk.item) && ruleAllows(stop.unload, pk.item)){
        pk.delivered = {stopIdx:t, station:st};
        deposits.push({train:pk.train, stopIdx:t, station:st, car:pk.car, item:pk.item, rate:pk.rate, fromStation:pk.station});
        break;
      }
      pk.carryPath.push(t);
    }
    if(!pk.delivered)
      warnings.push(`<b>${esc(pk.train.name)}</b> loads <b>${esc(pk.item)}</b> at ${esc(pk.station.name)} (car ${pk.car}) but never unloads it anywhere on its route. That car will fill up and stall loading.`);
  });

  /* ERROR A: explicit load item that the train cannot actually collect */
  w.trains.forEach(tr=>{
    (tr.stops||[]).forEach((stop,si)=>{
      if(stop.load.mode !== 'list') return;
      const st = stById[stop.stationId]; if(!st) return;
      (stop.load.items||[]).forEach(item=>{
        const got = pickups.some(pk => pk.train===tr && pk.stopIdx===si && pk.item.toLowerCase()===item.toLowerCase());
        if(got) return;
        const sources = st.platforms
          .map((p,i)=>({p,pos:i+1}))
          .filter(x => loadableFeeds(x.p).some(pi=>pi.item.toLowerCase()===item.toLowerCase()));
        let why;
        if(!sources.length){
          const misconfigured = st.platforms
            .map((p,i)=>({p,pos:i+1}))
            .filter(x => x.p.type!=='empty' && x.p.mode==='load' &&
              (x.p.items||[]).some(pi=>pi.item && pi.item.toLowerCase()===item.toLowerCase()));
          if(misconfigured.length){
            why = misconfigured.map(x =>
              `platform ${x.pos} is set to load it but is a ${x.p.type} platform, which can't handle ${isFluid(item)?'fluids':'solid items'}`
            ).join('; ') + '.';
          } else {
            why = `${esc(st.name)} has no load platform providing it.`;
          }
        } else {
          why = sources.map(x=>{
            if(x.pos >= tr.cars.length) return `platform ${x.pos} (train is too short to reach it)`;
            if(tr.cars[x.pos]==='E') return `platform ${x.pos} (engine occupies that car position)`;
            if(x.p.type==='fluid' && tr.cars[x.pos]!=='L') return `platform ${x.pos} (fluid platform, but the train has a freight car there; it needs a fluid car)`;
            if(x.p.type!=='fluid' && tr.cars[x.pos]==='L') return `platform ${x.pos} (regular platform, but the train has a fluid car there; it needs a freight car)`;
            return `platform ${x.pos}`;
          }).join(' and ');
          why = `it is only available at ${why}.`;
        }
        errors.push(`<b>${esc(tr.name)}</b> is set to load <b>${esc(item)}</b> at ${esc(st.name)}, but no valid freight car can collect it: ${why}`);
      });
    });
  });

  /* ERRORS B + C: two trains contending for the same item on the same platform */
  const byPlat = {};
  pickups.forEach(pk=>{
    const key = pk.station.id + '|' + pk.car + '|' + pk.item.toLowerCase();
    (byPlat[key] = byPlat[key] || []).push(pk);
  });
  const reported = new Set();
  Object.values(byPlat).forEach(list=>{
    const trains = [...new Map(list.map(pk=>[pk.train.id, pk.train])).values()];
    if(trains.length < 2) return;
    const pk = list[0];
    const names = trains.map(t=>`<b>${esc(t.name)}</b>`).join(' and ');
    const rkey = pk.station.id+'|'+pk.car+'|'+pk.item.toLowerCase()+'|'+trains.map(t=>t.id).sort().join(',');
    if(reported.has(rkey)) return; reported.add(rkey);
    errors.push(`${names} both pick up <b>${esc(pk.item)}</b> from platform ${pk.car} at ${esc(pk.station.name)}. Each item feed should go to exactly one train. Fix by blocking car position ${pk.car} on all but one of these trains with an engine or a car of the other type (or by shortening them or restricting their load rules).`);
  });

  /* same item, same station, different platforms: verify blocking is mutual */
  const byStItem = {};
  pickups.forEach(pk=>{
    const key = pk.station.id + '|' + pk.item.toLowerCase();
    (byStItem[key] = byStItem[key] || []).push(pk);
  });
  Object.values(byStItem).forEach(list=>{
    const perTrain = new Map();
    list.forEach(pk=>{
      if(!perTrain.has(pk.train.id)) perTrain.set(pk.train.id,{train:pk.train, cars:new Set(), station:pk.station, item:pk.item});
      perTrain.get(pk.train.id).cars.add(pk.car);
    });
    if(perTrain.size < 2) return;
    // If any two trains share a car position, the platform-contention error above already fired.
    // If their car sets are disjoint, each is properly blocked (engine or short consist), which is the valid Error-C resolution.
    // Nothing extra to report here; this grouping exists so the resolution logic is explicit.
  });

  /* explicit unload item that never happens */
  w.trains.forEach(tr=>{
    (tr.stops||[]).forEach((stop,si)=>{
      if(stop.unload.mode !== 'list') return;
      const st = stById[stop.stationId]; if(!st) return;
      (stop.unload.items||[]).forEach(item=>{
        const done = deposits.some(d => d.train===tr && d.stopIdx===si && d.item.toLowerCase()===item.toLowerCase());
        if(done) return;
        const carrying = pickups.filter(pk => pk.train===tr && pk.item.toLowerCase()===item.toLowerCase());
        let why;
        if(!carrying.length){
          why = `the train never loads ${esc(item)} anywhere on its route.`;
        } else {
          const passes = carrying.filter(pk => pk.carryPath.includes(si));
          const early = carrying.filter(pk => pk.delivered && !pk.carryPath.includes(si) && pk.delivered.stopIdx !== si);
          if(passes.length){
            const cars = [...new Set(passes.map(pk=>pk.car))];
            why = cars.map(c=>{
              const p = st.platforms[c-1];
              if(!p) return `car ${c} carries it here but ${esc(st.name)} has no platform at position ${c}`;
              if(p.type==='empty') return `car ${c} carries it here but platform ${c} is set to empty`;
              if(p.mode!=='unload') return `car ${c} carries it here but platform ${c} is set to load, not unload`;
              if(isFluid(item) !== (p.type==='fluid'))
                return isFluid(item)
                  ? `car ${c} carries it here but platform ${c} is a regular platform; fluids need a fluid platform`
                  : `car ${c} carries it here but platform ${c} is a fluid platform, which can't take solid items`;
              return `car ${c} carries it here but the stop's unload rule filters it out`;
            }).join('; ') + '.';
          } else if(early.length){
            const d = early[0].delivered;
            why = `it is already fully unloaded at ${esc(d.station.name)} (stop ${d.stopIdx+1}) before this stop.`;
          } else {
            why = `no car carrying it reaches this stop.`;
          }
        }
        warnings.push(`<b>${esc(tr.name)}</b> is set to unload <b>${esc(item)}</b> at ${esc(st.name)}, but never does: ${why}`);
      });
    });
  });

  /* orphaned platforms */
  w.stations.forEach(st=>{
    st.platforms.forEach((p,i)=>{
      if(p.type==='empty') return;
      if(p.mode==='load'){
        loadableFeeds(p).forEach(pi=>{
          const served = pickups.some(pk => pk.station===st && pk.car===i+1 && pk.item.toLowerCase()===pi.item.toLowerCase());
          if(!served)
            warnings.push(`Platform ${i+1} at <b>${esc(st.name)}</b> loads ${esc(pi.item)} (${fmt(pi.rate)}/min) but no train ever collects it.`);
        });
      }
      if(p.mode==='unload'){
        const fed = deposits.some(d => d.station===st && d.car===i+1);
        if(!fed)
          warnings.push(`Platform ${i+1} at <b>${esc(st.name)}</b> is set to unload but no train ever delivers anything to it.`);
      }
    });
  });

  return {errors, warnings, pickups, deposits};
}

function refreshBadge(){
  const a = analyze(W());
  const el = document.querySelector('.snav[data-sec="analysis"] .badge');

  el.textContent = a.errors.length ? a.errors.length : (a.warnings.length ? a.warnings.length : '✓');
}

/* ----- trains (consist + route) ----- */
function routeBlock(tr, w){
  const stops = tr.stops||[];
  if(!w.stations.length)
    return `<div class="routeblock"><span class="label">Route</span><div class="hint">Add stations first, then define this train's route here.</div></div>`;
  return `<div class="routeblock">
    <div class="routehead">
      <span class="label">Route · loop of ${stops.length} stop${stops.length===1?'':'s'}</span>
      <span class="spacer"></span>
      <button class="btn small primary" data-action="addStop" data-id="${tr.id}">+ Add stop</button>
    </div>
    ${stops.map((stop,si)=>`
      <div class="stop">
        <div class="stoprow">
          <span class="stopnum">${si+1}.</span>
          <select data-field="stopStation" data-id="${tr.id}" data-si="${si}">
            ${w.stations.map(st=>`<option value="${st.id}" ${st.id===stop.stationId?'selected':''}>${esc(st.name)}</option>`).join('')}
          </select>
          <span class="spacer" style="flex:1"></span>
          <button class="btn small" data-action="moveStop" data-id="${tr.id}" data-si="${si}" data-dir="-1" ${si===0?'disabled':''}>↑</button>
          <button class="btn small" data-action="moveStop" data-id="${tr.id}" data-si="${si}" data-dir="1" ${si===stops.length-1?'disabled':''}>↓</button>
          <button class="btn small ghost" data-action="deleteStop" data-id="${tr.id}" data-si="${si}">✕</button>
        </div>
        <div class="rules">
          <span class="rlabel load">Load</span>${ruleEditor(tr,si,'load')}
          <span class="rlabel unload">Unload</span>${ruleEditor(tr,si,'unload')}
        </div>
      </div>`).join('') || '<div class="empty" style="padding:8px 0">No stops yet.</div>'}
    ${stops.length>1?`<div class="looparrow">↺ returns to stop 1</div>`:''}
  </div>`;
}

      </div>

      <div class="consist">

          <div class="railcar ${c==='E'?'engine':c==='L'?'fluidcar':'freight'} ${i===0?'locked':''}"

               title="${i===0?'Lead engine (fixed)':'Click to cycle type'}">

            <span class="stripe"></span>

/* ----- stations ----- */
function viewStations(){
  const w = W();
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <span class="label">Platform N serves car position N of any docked train · drag ⠿ to reorder</span>
    <span style="display:flex;gap:6px">
      <button class="btn small" data-action="collapseAll" data-kind="station">Collapse all</button>
      <button class="btn small" data-action="expandAll" data-kind="station">Expand all</button>
      <button class="btn primary" data-action="addStation">+ Add station</button>
    </span></div>`;
  if(!w.stations.length) return html + `<div class="empty">No stations yet.</div>`;
  html += w.stations.map(st=>{
    const closed = !!state.collapsed[st.id];
    const nLoad = st.platforms.filter(p=>p.type!=='empty'&&p.mode==='load').length;
    const nUnload = st.platforms.filter(p=>p.type!=='empty'&&p.mode==='unload').length;
    return `
    <div class="card" data-kind="station" data-id="${st.id}">
      <div class="cardhead">
        <span class="draghandle" draggable="true" data-kind="station" data-id="${st.id}" title="Drag to reorder">⠿</span>
        <button class="chev ${closed?'closed':''}" data-action="toggleCollapse" data-id="${st.id}" title="${closed?'Expand':'Collapse'}">▼</button>
        <input type="text" class="name" value="${esc(st.name)}" data-field="stationName" data-id="${st.id}">
        <span class="spacer"></span>
        <span class="label">${st.platforms.length} platforms · ${nLoad} load · ${nUnload} unload</span>
        ${closed?'':`<button class="btn small" data-action="addPlatform" data-id="${st.id}">+ Platform</button>`}
        <button class="btn small ghost" data-action="deleteStation" data-id="${st.id}">✕</button>
      </div>
      ${closed?'':`
      <div class="plats">
        ${st.platforms.map((p,i)=>`
          <div class="plat ${p.type==='empty'?'empty':p.mode} ${p.type==='fluid'?'fluid':''}">
            <span class="pos">PLAT ${i+1}</span>
            <span class="seg">
              <button class="${p.type==='regular'?'on regular':''}" data-action="platType" data-id="${st.id}" data-i="${i}" data-type="regular">Regular</button>
              <button class="${p.type==='fluid'?'on fluid':''}" data-action="platType" data-id="${st.id}" data-i="${i}" data-type="fluid">Fluid</button>
              <button class="${p.type==='empty'?'on empty':''}" data-action="platType" data-id="${st.id}" data-i="${i}" data-type="empty">Empty</button>
            </span>
            ${p.type!=='empty' ? `
            <span class="seg">
              <button class="${p.mode==='load'?'on load':''}" data-action="platMode" data-id="${st.id}" data-i="${i}" data-mode="load">Load</button>
              <button class="${p.mode==='unload'?'on unload':''}" data-action="platMode" data-id="${st.id}" data-i="${i}" data-mode="unload">Unload</button>
            </span>` : ''}
            ${p.type==='empty' ?
              `<span class="dimtxt">placeholder, exchanges no cargo</span>` :
             p.mode==='unload' ?
              `<span class="dimtxt">receives ${p.type==='fluid'?'a fluid':'solids'} that docked trains drop here</span>` :
             p.type==='fluid' ? `
              <div class="platitems">
                <div class="platitem">
                  <select data-field="platItem" data-id="${st.id}" data-i="${i}" data-j="0">
                    ${itemOptions((p.items[0]||{}).item, 'fluid')}
                  </select>
                  <input type="number" min="0" step="any" value="${esc((p.items[0]||{rate:0}).rate)}" data-field="platRate" data-id="${st.id}" data-i="${i}" data-j="0">
                  <span class="dimtxt mono">m³/min</span>
                </div>
              </div>` : `
              <div class="platitems">
                ${(p.items||[]).map((pi,j)=>`
                  <div class="platitem">
                    <select data-field="platItem" data-id="${st.id}" data-i="${i}" data-j="${j}">
                      ${itemOptions(pi.item, 'solid')}
                    </select>
                    <input type="number" min="0" step="any" value="${esc(pi.rate)}" data-field="platRate" data-id="${st.id}" data-i="${i}" data-j="${j}">
                    <span class="dimtxt mono">/min</span>
                    <button class="btn small ghost" data-action="deletePlatItem" data-id="${st.id}" data-i="${i}" data-j="${j}" title="Remove item">✕</button>
                  </div>`).join('')}
                <button class="btn small" data-action="addPlatItem" data-id="${st.id}" data-i="${i}">+ Item</button>
              </div>`}
            <button class="btn small ghost" data-action="deletePlatform" data-id="${st.id}" data-i="${i}" title="Remove platform">✕</button>
          </div>`).join('') || '<div class="empty">No platforms.</div>'}
      </div>`}
    </div>`;
  }).join('');
  return html;
}

/* ----- route rule editor (used inside train cards) ----- */
function ruleEditor(tr, si, kind){
  const stop = tr.stops[si];
  const rule = stop[kind];
  return `<div class="rulewrap">
    <select data-field="ruleMode" data-id="${tr.id}" data-si="${si}" data-kind="${kind}">
      <option value="any" ${rule.mode==='any'?'selected':''}>Anything</option>
      <option value="none" ${rule.mode==='none'?'selected':''}>None</option>
      <option value="list" ${rule.mode==='list'?'selected':''}>Specific items</option>
    </select>
    ${rule.mode==='list' ? `
      ${(rule.items||[]).map((it,ii)=>`
        <span class="chip ${kind}">${esc(it)}
          <button data-action="ruleRemoveItem" data-id="${tr.id}" data-si="${si}" data-kind="${kind}" data-ii="${ii}" title="Remove">✕</button>
        </span>`).join('')}
      <select data-field="ruleAddItem" data-id="${tr.id}" data-si="${si}" data-kind="${kind}">
        ${itemOptions('').replace('— item —','+ add item')}
      </select>` : ''}
  </div>`;
}
/* ----- analysis ----- */
function viewAnalysis(){
  const w = W();
  const a = analyze(w);
  let html = '';

  html += `<h2 class="sec" style="margin-top:0">Problems</h2>`;
  if(!a.errors.length && !a.warnings.length){
    html += `<div class="allclear">✓ &nbsp;No conflicts detected. All flows check out.</div>`;
  } else {
    html += a.errors.map(e=>`<div class="issue err"><span class="tag">Error</span><span>${e}</span></div>`).join('');
    html += a.warnings.map(e=>`<div class="issue warn"><span class="tag">Warning</span><span>${e}</span></div>`).join('');
  }

  /* station boards */
  html += `<h2 class="sec">Station platforms · computed throughput</h2>`;
  if(!w.stations.length) html += `<div class="empty">No stations defined.</div>`;
  w.stations.forEach(st=>{
    html += `<div class="board"><h3>${esc(st.name)}</h3>
      <table class="flow">
        <tr><th style="width:70px">Platform</th><th style="width:90px">Mode</th><th>Contents</th><th style="width:220px">Trains</th></tr>`;
    st.platforms.forEach((p,i)=>{
      const chip = m => `<span class="modechip ${m}">${p.type==='fluid'?'Fluid ':''}${m==='load'?'Load':'Unload'}</span>`;
      if(p.type==='empty'){
        html += `<tr>
          <td class="mono dimtxt">${i+1}</td>
          <td><span class="modechip empty">Empty</span></td>
          <td><span class="dimtxt">no cargo exchange</span></td>
          <td><span class="dimtxt">—</span></td>
        </tr>`;
      } else if(p.mode==='load'){
        const named = (p.items||[]).filter(pi=>pi.item).slice(0, p.type==='fluid'?1:Infinity);
        const rows = named.map(pi=>{
          const takers = [...new Set(a.pickups
            .filter(pk=>pk.station===st && pk.car===i+1 && pk.item.toLowerCase()===pi.item.toLowerCase())
            .map(pk=>pk.train.name))];
          return {pi, takers};
        });
        html += `<tr>
          <td class="mono dimtxt">${i+1}</td>
          <td>${chip('load')}</td>
          <td>${rows.length?rows.map(r=>`${esc(r.pi.item)} <span class="rate">${fmt(r.pi.rate)}/min</span>`).join('<br>'):'<span class="dimtxt">no items set</span>'}</td>
          <td>${rows.length?rows.map(r=>r.takers.length?r.takers.map(esc).join(', '):'<span class="dimtxt">uncollected</span>').join('<br>'):'<span class="dimtxt">—</span>'}</td>
        </tr>`;
      } else {
        const feeds = a.deposits.filter(d=>d.station===st && d.car===i+1);
        const byItem = {};
        feeds.forEach(d=>{
          const k = d.item.toLowerCase();
          if(!byItem[k]) byItem[k] = {item:d.item, rate:0, trains:new Set()};
          byItem[k].rate += d.rate;
          byItem[k].trains.add(d.train.name);
        });
        const rows = Object.values(byItem);
        html += `<tr>
          <td class="mono dimtxt">${i+1}</td>
          <td>${chip('unload')}</td>
          <td>${rows.length?rows.map(r=>`${esc(r.item)} <span class="rate">${fmt(r.rate)}/min</span>`).join('<br>'):'<span class="dimtxt">empty</span>'}</td>
          <td>${rows.length?[...new Set(rows.flatMap(r=>[...r.trains]))].map(esc).join(', '):'<span class="dimtxt">—</span>'}</td>
        </tr>`;
      }
    });
    html += `</table></div>`;
  });

  /* train manifests */
  html += `<h2 class="sec">Train manifests · what actually happens each loop</h2>`;
  if(!w.trains.length) html += `<div class="empty">No trains defined.</div>`;
  w.trains.forEach(tr=>{
    const stops = tr.stops||[];
    html += `<div class="board"><h3>${esc(tr.name)}</h3><div class="manif">`;
    if(!stops.length){ html += `<span class="dimtxt">No route.</span>`; }
    stops.forEach((stop,si)=>{
      const st = w.stations.find(s=>s.id===stop.stationId);
      const loads = a.pickups.filter(pk=>pk.train===tr && pk.stopIdx===si);
      const drops = a.deposits.filter(d=>d.train===tr && d.stopIdx===si);
      html += `<div class="mstop">
        <span class="mono dimtxt">${si+1}.</span> <b>${st?esc(st.name):'<i>missing station</i>'}</b>
        <span class="dimtxt">· load: ${esc(ruleText(stop.load))} · unload: ${esc(ruleText(stop.unload))}</span><br>
        ${drops.length?`<span class="ul">⬇ unloads ${drops.map(d=>`${esc(d.item)} ${fmt(d.rate)}/min (car ${d.car})`).join(', ')}</span><br>`:''}
        ${loads.length?`<span class="ld">⬆ loads ${loads.map(p=>`${esc(p.item)} ${fmt(p.rate)}/min (car ${p.car})`).join(', ')}</span>`:''}
        ${!loads.length&&!drops.length?'<span class="dimtxt">no cargo exchanged</span>':''}
      </div>`;
    });
    /* cargo journeys: why each pickup unloads where it does */
    const journeys = a.pickups.filter(pk=>pk.train===tr);
    if(journeys.length){
      const skipReason = (t, car, item) => {
        const stop = stops[t];
        const st2 = w.stations.find(s=>s.id===stop.stationId);
        if(!st2) return 'missing station';
        const p = st2.platforms[car-1];
        if(!p) return `no platform ${car}`;
        if(p.type==='empty') return `platform ${car} is empty`;
        if(p.mode!=='unload') return `platform ${car} is set to load`;
        if(isFluid(item) !== (p.type==='fluid')) return `platform ${car} is the wrong type`;
        if(!ruleAllows(stop.unload, item)) return 'unload rule filters it';
        return 'skipped';
      };
      html += `<div class="journeys"><span class="label" style="font-size:10px">Cargo journeys</span>
        ${journeys.map(pk=>{
          const steps = pk.carryPath.map(t=>{
            const s2 = w.stations.find(s=>s.id===stops[t].stationId);
            return `<span class="dimtxt">→ skips ${s2?esc(s2.name):'?'} (${esc(skipReason(t, pk.car, pk.item))})</span>`;
          }).join(' ');
          const tail = pk.delivered
            ? `→ <span class="ul">unloads at ${esc(pk.delivered.station.name)}</span>`
            : `→ <span style="color:var(--warn)">never unloaded, accumulates</span>`;
          return `<div class="jrow"><span class="mono">car ${pk.car}</span> · ${esc(pk.item)} ${fmt(pk.rate)}/min · <span class="ld">loads at ${esc(pk.station.name)}</span> ${steps} ${tail}</div>`;
        }).join('')}
      </div>`;
    }
    html += `</div></div>`;
  });
  return html;
}

/* ============================== event handling ============================== */
document.addEventListener('click', e=>{
  const el = e.target.closest('[data-action]');
  if(!el || !el.dataset.action) return;
  const w = W();
  const act = el.dataset.action;
  const id = el.dataset.id;
  const train = () => w.trains.find(t=>t.id===id);
  const station = () => w.stations.find(s=>s.id===id);

  switch(act){
    case 'pickWorld': state.active = +el.dataset.i; break;
    case 'pickSection': state.section = el.dataset.sec; break;
    case 'addWorld': {
      askText('World name:', 'World '+(state.worlds.length+1)).then(name=>{
        if(name===null) return;
        state.worlds.push(newWorld(name.trim()||('World '+(state.worlds.length+1))));
        state.active = state.worlds.length-1;
        save(); render();
      });
      return;
    }
    case 'renameWorld': {
      askText('Rename world:', w.name).then(name=>{
        if(name===null) return;
        w.name = name.trim()||w.name;
        save(); render();
      });
      return;
    }
    case 'deleteWorld': {
      askConfirm(`Delete world "${w.name}" and everything in it?`).then(ok=>{
        if(!ok) return;
        state.worlds.splice(state.active,1);
        if(!state.worlds.length) state.worlds.push(newWorld('World 1'));
        state.active = Math.max(0, state.active-1);
        save(); render();
      });
      return;
    }
    case 'exportWorld': {
      openExportDialog(w);
      return;
    }
    case 'importWorld': document.getElementById('importModal').showModal(); return;

    case 'toggleCollapse': {
      if(state.collapsed[id]) delete state.collapsed[id];
      else state.collapsed[id] = true;
      break;
    }
    case 'collapseAll': {
      const list = el.dataset.kind==='train' ? w.trains : w.stations;
      list.forEach(x=>state.collapsed[x.id]=true);
      break;
    }
    case 'expandAll': {
      const list = el.dataset.kind==='train' ? w.trains : w.stations;
      list.forEach(x=>delete state.collapsed[x.id]);
      break;
    }

    case 'addTrain': w.trains.push(newTrain(w.trains.length+1)); break;
    case 'deleteTrain': {
      askConfirm(`Delete ${train().name}?`).then(ok=>{
        if(!ok) return;
        w.trains = w.trains.filter(t=>t.id!==id);
        save(); render();
      });
      return;
    }
    case 'addCar': train().cars.push('F'); break;
    case 'removeCar': { const t=train(); if(t.cars.length>1) t.cars.pop(); break; }
    case 'toggleCar': {
      const t=train(); const i=+el.dataset.i;
      if(i>0) t.cars[i] = t.cars[i]==='E' ? 'F' : t.cars[i]==='F' ? 'L' : 'E';
      break;
    }

    case 'addStation': w.stations.push(newStation(w.stations.length+1)); break;
    case 'deleteStation': {
      askConfirm(`Delete ${station().name}?`).then(ok=>{
        if(!ok) return;
        w.stations = w.stations.filter(s=>s.id!==id);
        save(); render();
      });
      return;
    }
    case 'addPlatform': station().platforms.push(newPlatform()); break;
    case 'deletePlatform': station().platforms.splice(+el.dataset.i,1); break;
    case 'platType': {
      const p = station().platforms[+el.dataset.i];
      p.type = el.dataset.type;
      if(!p.mode) p.mode = 'load';
      if(!(p.items||[]).length) p.items = [{item:'', rate:60}];
      break;
    }
    case 'platMode': {
      const p = station().platforms[+el.dataset.i];
      p.mode = el.dataset.mode;
      if(p.mode==='load' && !(p.items||[]).length) p.items = [{item:'', rate:60}];
      break;
    }
    case 'addPlatItem': station().platforms[+el.dataset.i].items.push({item:'', rate:60}); break;
    case 'deletePlatItem': station().platforms[+el.dataset.i].items.splice(+el.dataset.j,1); break;

    case 'addStop': {
      const t=train();
      t.stops = t.stops||[];
      t.stops.push(newStop(w.stations[0] ? w.stations[0].id : null));
      break;
    }
    case 'deleteStop': train().stops.splice(+el.dataset.si,1); break;
    case 'ruleRemoveItem': {
      const rule = train().stops[+el.dataset.si][el.dataset.kind];
      rule.items.splice(+el.dataset.ii,1);
      break;
    }
    case 'moveStop': {
      const t=train(); const si=+el.dataset.si; const d=+el.dataset.dir;
      const j=si+d; if(j<0||j>=t.stops.length) return;
      [t.stops[si],t.stops[j]]=[t.stops[j],t.stops[si]];
      break;
    }
    default: return;
  }
  save(); render();
});

/* drag and drop reordering of train / station cards */
let dragState = null;
document.addEventListener('dragstart', e=>{
  const h = e.target.closest ? e.target.closest('.draghandle') : null;
  if(!h){ e.preventDefault(); return; }
  dragState = {kind: h.dataset.kind, id: h.dataset.id};
  e.dataTransfer.effectAllowed = 'move';
  try{ e.dataTransfer.setData('text/plain', h.dataset.id); }catch(err){}
  const card = h.closest('.card');
  if(card){
    e.dataTransfer.setDragImage(card, 20, 20);
    requestAnimationFrame(()=>card.classList.add('dragging'));
  }
});
document.addEventListener('dragover', e=>{
  if(!dragState) return;
  const card = e.target.closest ? e.target.closest(`.card[data-kind="${dragState.kind}"]`) : null;
  if(!card || card.dataset.id===dragState.id) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.card.dragover').forEach(c=>{ if(c!==card) c.classList.remove('dragover'); });
  card.classList.add('dragover');
});
document.addEventListener('dragleave', e=>{
  const card = e.target.closest ? e.target.closest('.card.dragover') : null;
  if(card && !card.contains(e.relatedTarget)) card.classList.remove('dragover');
});
document.addEventListener('drop', e=>{
  if(!dragState) return;
  const card = e.target.closest ? e.target.closest(`.card[data-kind="${dragState.kind}"]`) : null;
  if(!card || card.dataset.id===dragState.id){ dragState=null; return; }
  e.preventDefault();
  const w = W();
  const arr = dragState.kind==='train' ? w.trains : w.stations;
  const from = arr.findIndex(x=>x.id===dragState.id);
  const to = arr.findIndex(x=>x.id===card.dataset.id);
  if(from>-1 && to>-1 && from!==to){
    arr.splice(to, 0, arr.splice(from,1)[0]);
    save(); render();
  }
  dragState = null;
});
document.addEventListener('dragend', ()=>{
  dragState = null;
  document.querySelectorAll('.card.dragover,.card.dragging').forEach(c=>c.classList.remove('dragover','dragging'));
});

/* double-click a world tab to rename */
document.addEventListener('dblclick', e=>{
  const el = e.target.closest('.wtab');
  if(!el) return;
  state.active = +el.dataset.i;
  save(); render();
  askText('Rename world:', W().name).then(name=>{
    if(name!==null){ W().name = name.trim()||W().name; }
    save(); render();
  });
});

/* field edits (no full rerender needed except mode switches) */
document.addEventListener('change', e=>{
  const el = e.target;
  const f = el.dataset.field;
  if(!f) return;
  const w = W();
  const train = () => w.trains.find(t=>t.id===el.dataset.id);
  const station = () => w.stations.find(s=>s.id===el.dataset.id);

  switch(f){
    case 'trainName': train().name = el.value.trim()||train().name; break;
    case 'stationName': station().name = el.value.trim()||station().name; break;
    case 'platItem': {
      const p = station().platforms[+el.dataset.i]; const j = +el.dataset.j;
      if(!p.items[j]) p.items[j] = {item:'', rate:60};
      p.items[j].item = el.value.trim();
      break;
    }
    case 'platRate': {
      const p = station().platforms[+el.dataset.i]; const j = +el.dataset.j;
      if(!p.items[j]) p.items[j] = {item:'', rate:0};
      p.items[j].rate = Math.max(0, +el.value||0);
      break;
    }
    case 'stopStation': train().stops[+el.dataset.si].stationId = el.value; break;
    case 'ruleMode': {
      train().stops[+el.dataset.si][el.dataset.kind].mode = el.value;
      save(); render(); return;
    }
    case 'ruleAddItem': {
      const v = el.value;
      if(!v) return;
      const rule = train().stops[+el.dataset.si][el.dataset.kind];
      rule.items = rule.items||[];
      if(!rule.items.includes(v)) rule.items.push(v);
      save(); render(); return;
    }
  }
  save();
});

/* import */
function importWorldFromJSON(text){
  const data = JSON.parse(text);
  if(!data || typeof data.name!=='string' || !Array.isArray(data.trains) || !Array.isArray(data.stations))
    throw new Error('Not a valid world export.');
  data.id = uid();
  migrateWorld(data);
  state.worlds.push(data);
  state.active = state.worlds.length-1;
  save(); render();
}
document.getElementById('importFile').addEventListener('change', e=>{
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const rd = new FileReader();
  rd.onload = () => {
    try{
      importWorldFromJSON(rd.result);
      document.getElementById('importModal').close();
    }catch(err){
      askNotice('Import failed: '+err.message);
    }
  };
  rd.readAsText(file);
});
function wireImportDialog(){
  const dlg = document.getElementById('importModal');
  document.getElementById('importClose').addEventListener('click', ()=>dlg.close());
  document.getElementById('importFileBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
  document.getElementById('importGo').addEventListener('click', ()=>{
    const text = document.getElementById('importText').value.trim();
    if(!text){ askNotice('Paste a world JSON first, or use "Choose file".'); return; }
    try{
      importWorldFromJSON(text);
      document.getElementById('importText').value = '';
      dlg.close();
    }catch(err){
      askNotice('Import failed: '+err.message);
    }
  });
}

/* ============================== boot ============================== */
(async ()=>{
  await initState();
  const note = document.getElementById('storageNote');
  const base = document.getElementById('storageBase');
  if(BACKEND==='cloud'){
    base.textContent = 'Data is saved to Claude artifact storage for your account and syncs across sessions.';
  } else if(BACKEND==='local'){
    base.textContent = 'Data is saved to this browser via localStorage.';
  } else {
    base.textContent = '';
    note.textContent = 'No persistent storage is available in this environment, so changes will not be saved. Export your world as JSON before leaving, or download the file and open it locally.';
  }
  wireExportDialog();
  wireImportDialog();
  render();
})();
